name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            cd /var/www/glafira

            git fetch origin main --quiet
            LOCAL=$(git rev-parse HEAD)
            REMOTE=$(git rev-parse origin/main)

            if [ "$LOCAL" = "$REMOTE" ]; then
              echo "No new commits — nothing to deploy."
              exit 0
            fi

            echo "[$(date -Iseconds)] new commits: $LOCAL → $REMOTE"
            git pull origin main --ff-only

            CHANGED=$(git diff --name-only "$LOCAL" "$REMOTE")
            REBUILD_FRONT=$(echo "$CHANGED" | grep -E "^frontend/" || true)
            REBUILD_BACK=$(echo "$CHANGED" | grep -E "^backend/" || true)

            if [ -n "$REBUILD_BACK" ]; then
              echo "Rebuild backend"
              docker compose -f docker-compose.prod.yml build backend
            fi
            if [ -n "$REBUILD_FRONT" ]; then
              echo "Rebuild frontend"
              docker compose -f docker-compose.prod.yml build frontend
            fi

            docker compose -f docker-compose.prod.yml up -d

            if echo "$CHANGED" | grep -qE "^backend/alembic/versions/"; then
              echo "Run alembic upgrade head"
              docker compose -f docker-compose.prod.yml run --rm backend alembic upgrade head
            fi

              # Суперадминка — отдельный сервис (profiles:[superadmin]), обычный up -d
              # её не трогает (свой образ glafira-superadmin). Если менялись её файлы
              # И она УЖЕ запущена — пересобрать и перезапустить. Не запущена → пропуск.
              if echo "$CHANGED" | grep -qE "^backend/superadmin/"; then
                if [ -n "$(docker ps -q --filter name=glafira-superadmin --filter status=running)" ]; then
                  echo "Rebuild + restart superadmin (running)"
                  docker compose -f docker-compose.prod.yml --profile superadmin build superadmin \
                    && docker compose -f docker-compose.prod.yml --profile superadmin up -d superadmin \
                    || echo "WARN: superadmin rebuild/restart failed — проверь вручную"
                else
                  echo "superadmin not running — skip (поднять: --profile superadmin up -d --build superadmin)"
                fi
              fi


            echo "[$(date -Iseconds)] deployed: $REMOTE"
