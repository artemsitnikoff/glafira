# Production compose. На VPS:
#   docker compose -f docker-compose.prod.yml up -d db          # сначала БД
#   docker compose -f docker-compose.prod.yml run --rm backend alembic upgrade head
#   docker compose -f docker-compose.prod.yml run --rm backend python -m app.seed
#   docker compose -f docker-compose.prod.yml up -d              # поднять всё
#
# Порты бек/фронт привязаны к 127.0.0.1 — наружу выходит через общий nginx на VPS.
# Postgres наружу НЕ публикуется — доступ только внутри compose-сети.

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - glafira_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage
      # Общий токен claude (read-only) для интернет-разведки верификации. Монтируем ПАПКУ,
      # не файл: ArkadyJarvis атомарно подменяет токен через rename — маунт одного файла
      # застрянет на старом иноде. CLAUDE_TOKEN_DIR в .env (по умолчанию папка ArkadyJarvis).
      # И задать в .env: CLAUDE_TOKEN_FILE=/app/claude-auth/.claude_token.json
      - ${CLAUDE_TOKEN_DIR:-/var/www/ArkadyJarvis/data}:/app/claude-auth:ro
    ports:
      - "127.0.0.1:8000:8000"
    # Production: без --reload, 2 worker'а. При мало RAM можно --workers 1.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"

  # Суперадминка управления тенантами. ИЗОЛИРОВАНА от клиентского приложения
  # (отдельный код backend/superadmin/, своя авторизация из env SUPERADMIN_*).
  # ⚠️ profiles:[superadmin] — автодеплой (docker compose up -d БЕЗ профиля) её НЕ
  # стартует. Поднимать вручную ПОСЛЕ задания SUPERADMIN_* в .env и настройки nginx:
  #   docker compose -f docker-compose.prod.yml --profile superadmin up -d superadmin
  # Тот же образ что backend (есть пакеты app + superadmin), другая команда/порт.
  # backend_storage:ro — читать junit-xml последнего прогона тестов.
  superadmin:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage:ro
    ports:
      # Хост-порт настраивается через SUPERADMIN_PORT в .env. На общем VPS 8001
      # часто занят чужим сервисом → задать свободный, напр. SUPERADMIN_PORT=18001.
      # Контейнер внутри всегда слушает 8001 (см. command).
      - "127.0.0.1:${SUPERADMIN_PORT:-8001}:8001"
    command: uvicorn superadmin.main:app --host 0.0.0.0 --port 8001
    profiles: ["superadmin"]

volumes:
  glafira_pgdata:
  backend_storage:
