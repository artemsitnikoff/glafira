[pytest]
asyncio_mode = auto
# rootdir (/app) в sys.path — иначе `from app...` в conftest падает ModuleNotFoundError
# при запуске pytest с явным путём к файлу (и в части окружений при bare-запуске).
pythonpath = .
testpaths = tests
python_files = test_*.py
python_functions = test_*
# --junitxml: результат прогона пишется в общий том backend_storage (/app/storage),
# откуда его читает суперадмин-сервис (профиль superadmin) для дашборда тестов.
addopts = -v --tb=short --junitxml=/app/storage/test-results.xml