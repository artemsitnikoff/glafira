<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Суперадмин — Глафира{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* From frontend tokens.css - use real values */
            --ark-white: #FFFFFF;
            --ark-gray-50: #F8F9FB;
            --ark-gray-100: #F4F6F8;
            --ark-gray-200: #ECEFF2;
            --ark-gray-300: #E6E9EC;
            --ark-gray-400: #C9CFD6;
            --ark-gray-500: #9AA3AE;
            --ark-gray-600: #5B6573;
            --ark-gray-700: #3A4452;
            --ark-gray-800: #1F2733;
            --ark-gray-900: #0F1620;
            --ark-blue-50: #EAF3FE;
            --ark-blue-500: #2A8AF0;
            --ark-blue-600: #1F7AE0;
            --ark-blue-700: #1865BE;
            --ark-green-500: #16A34A;
            --ark-red-500: #DC4646;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, 'Helvetica Neue', Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: var(--ark-gray-900);
            background-color: var(--ark-gray-50);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: var(--ark-white);
            border-bottom: 1px solid var(--ark-gray-200);
            margin-bottom: 30px;
            border-radius: 8px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: var(--ark-blue-600);
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 13px;
            color: var(--ark-gray-600);
        }

        .btn {
            display: inline-block;
            padding: 8px 16px;
            border: 1px solid transparent;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-primary {
            background: var(--ark-blue-500);
            color: white;
            border-color: var(--ark-blue-500);
        }

        .btn-primary:hover {
            background: var(--ark-blue-600);
            border-color: var(--ark-blue-600);
        }

        .btn-secondary {
            background: var(--ark-white);
            color: var(--ark-gray-700);
            border-color: var(--ark-gray-300);
        }

        .btn-secondary:hover {
            background: var(--ark-gray-50);
        }

        .btn-danger {
            background: var(--ark-red-500);
            color: white;
            border-color: var(--ark-red-500);
        }

        .card {
            background: var(--ark-white);
            border: 1px solid var(--ark-gray-200);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--ark-gray-800);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--ark-gray-700);
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--ark-gray-300);
            border-radius: 6px;
            font-size: 14px;
            background: var(--ark-white);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--ark-blue-500);
            box-shadow: 0 0 0 3px rgba(42, 138, 240, 0.1);
        }

        .form-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--ark-gray-300);
            border-radius: 6px;
            font-size: 14px;
            background: var(--ark-white);
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 8px center;
            background-repeat: no-repeat;
            background-size: 16px;
            padding-right: 36px;
            appearance: none;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .alert-error {
            background: #fcf2f2;
            color: var(--ark-red-500);
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #f0fdf4;
            color: var(--ark-green-500);
            border: 1px solid #bbf7d0;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .table th,
        .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--ark-gray-200);
        }

        .table th {
            background: var(--ark-gray-50);
            font-weight: 600;
            color: var(--ark-gray-700);
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-yes {
            background: #dcfce7;
            color: var(--ark-green-500);
        }

        .status-no {
            background: #fef2f2;
            color: var(--ark-red-500);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% if request.url.path != '/super/login' %}
    <div class="header">
        <div class="header-content">
            <div class="logo">🔧 Суперадмин — Глафира <span style="font-size: 12px; font-weight: 400; color: var(--ark-gray-500); margin-left: 6px;">v{{ app_version() }}</span></div>
            <div class="user-menu">
                <span>{{ username }}</span>
                <form method="post" action="/super/logout" style="display: inline;">
                    <button type="submit" class="btn btn-secondary">Выход</button>
                </form>
            </div>
        </div>
    </div>
    {% endif %}

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
