version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: glafira
      POSTGRES_USER: glafira
      POSTGRES_PASSWORD: glafira
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glafira -d glafira"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_storage:/app/storage
    environment:
      - DATABASE_URL=postgresql+asyncpg://glafira:glafira@db:5432/glafira
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
  backend_storage: